version: '3'

services:
  web:
    build: ./Backend/
    command: python eurovision/manage.py runserver 127.0.0.1:8000
    volumes:
      - .:/Backend/code
    ports:
      - "8000:8000"
    networks:
      - "backend"

  nginx:
    build: ./NGINX/
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend

networks:
  backend: